<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F7E48"/>
      <stop offset="100%" stop-color="#1F5132"/>
    </linearGradient>
    <linearGradient id="earthGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E4C47A"/>
      <stop offset="100%" stop-color="#B98545"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#12251A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- icon -->
  <g filter="url(#shadow)">
    <circle cx="180" cy="180" r="118" fill="url(#greenGrad)"/>
    <circle cx="180" cy="180" r="108" fill="none" stroke="#F5E7C8" stroke-width="5" opacity="0.9"/>

    <!-- yard/hill -->
    <path d="M73 234 C115 203 145 221 179 198 C217 173 251 190 287 158 L287 286 L73 286 Z" fill="url(#earthGrad)"/>

    <!-- stone path -->
    <path d="M162 224 C174 215 189 213 201 222 L222 286 L137 286 Z" fill="#F7E4B0" opacity="0.95"/>
    <path d="M174 233 L196 230" stroke="#BD8B4D" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M161 253 L210 249" stroke="#BD8B4D" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M150 273 L218 269" stroke="#BD8B4D" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M181 223 L174 286" stroke="#BD8B4D" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <path d="M201 229 L203 286" stroke="#BD8B4D" stroke-width="4" stroke-linecap="round" opacity="0.55"/>

    <!-- leaf mark -->
    <path d="M169 89 C211 82 238 104 239 137 C203 143 176 126 169 89 Z" fill="#A7D36B"/>
    <path d="M179 98 C197 112 213 123 231 132" stroke="#2F6B3F" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
    <path d="M151 138 C163 115 177 101 196 92" stroke="#F5E7C8" stroke-width="9" stroke-linecap="round" opacity="0.95"/>

    <!-- initials -->
    <text x="180" y="184" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="54" font-weight="800" fill="#FFFFFF" letter-spacing="-2">DIY</text>
  </g>

  <!-- wordmark -->
  <text x="340" y="155" font-family="Inter, Arial, Helvetica, sans-serif" font-size="82" font-weight="800" fill="#1F5132" letter-spacing="-2">DIY Yard</text>
  <text x="340" y="235" font-family="Inter, Arial, Helvetica, sans-serif" font-size="82" font-weight="800" fill="#B98545" letter-spacing="-2">Pro</text>
  <path d="M515 249 H762" stroke="#2F6B3F" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <text x="340" y="290" font-family="Inter, Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="#5C6B60" letter-spacing="0.5">Professional DIY Landscaping Guides</text>
</svg>
